services:

  # ── Backend: FastAPI + 3 agent loops ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: axion-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override CORS so the frontend container (port 3000) is allowed
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      # Persist logs and SQLite DB at the same relative paths as local dev
      - ./logs:/app/logs
      - ./backend/data:/app/backend/data
      # Persist kraken CLI paper-trading state (balance, orders) across restarts
      - kraken_state:/root/.config/kraken
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/state"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Frontend: React dashboard served by nginx ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: axion-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# Named volume for kraken CLI config/paper state
volumes:
  kraken_state:
